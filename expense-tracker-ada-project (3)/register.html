<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Expense Tracker</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f0f4f8; padding: 2rem; }
        .auth-card { background: white; padding: 2rem; border-radius: 0.5rem; width: 100%; max-width: 500px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .auth-title { text-align: center; font-size: 1.5rem; font-weight: bold; margin-bottom: 1.5rem; color: var(--primary-color); }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.875rem; }
        .btn-block { width: 100%; padding: 0.75rem; font-size: 1rem; margin-top: 1rem; }
        .auth-links { text-align: center; margin-top: 1.5rem; font-size: 0.875rem; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-title">Create Account</div>
        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" required>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" id="mobile" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required minlength="8">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" required minlength="8">
            </div>
            <button type="submit" class="btn-block">Register</button>
            <div class="auth-links">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </form>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
