<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - ADA Project</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="layout">
        
<aside class="sidebar">
    <div class="sidebar-logo">ExpenseTracker</div>
    <nav class="sidebar-nav">
        <a href="dashboard.html" id="nav-dashboard">Dashboard</a>
        <a href="search-demo.html" id="nav-search">Search Demo</a>
        <a href="sorting-demo.html" id="nav-sorting">Sorting Demo</a>
        <a href="algorithm-analysis.html" id="nav-algorithm-analysis">Algorithm Analysis</a>
        <a href="reports.html" id="nav-reports">Reports</a>
        <a href="profile.html" id="nav-profile">Profile</a>
        <a href="#" onclick="logout()">Logout</a>
    </nav>
</aside>
        <main class="main-content">
            
<header class="header">
    <div class="header-title">
        <h1>User Profile</h1>
        <p>Manage your account</p>
    </div>
    <div class="user-profile-btn" onclick="window.location.href='profile.html'">
        <div class="user-avatar" id="userAvatar">U</div>
        <span id="userName">User</span>
    </div>
</header>
            
<div class="card" style="max-width: 500px;">
    <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;">
        <div id="profileAvatar" style="width: 80px; height: 80px; border-radius: 50%; background: var(--primary-color); color: white; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold;"></div>
        <div>
            <h2 id="profileName">User Name</h2>
            <p id="profileUsername" style="color: var(--text-muted);">@username</p>
        </div>
    </div>
    
    <div style="margin-bottom: 2rem;">
        <p><strong>Email:</strong> <span id="profileEmail"></span></p>
        <p><strong>Mobile:</strong> <span id="profileMobile"></span></p>
    </div>
    
    <button style="background: var(--danger);" onclick="logout()">Logout</button>
</div>

        </main>
    </div>
    <script src="js/session.js"></script>
    <script src="js/storage.js"></script>
    <script>
        const navEl = document.getElementById('nav-profile'); if (navEl) navEl.classList.add('active');
    </script>
    <script>const u = checkAuth(); if (u) { document.getElementById("profileName").innerText = u.fullName; document.getElementById("profileUsername").innerText = "@" + u.username; document.getElementById("profileEmail").innerText = u.email; document.getElementById("profileMobile").innerText = u.mobile; document.getElementById("profileAvatar").innerText = u.fullName.charAt(0).toUpperCase(); }</script>
</body>
</html>
