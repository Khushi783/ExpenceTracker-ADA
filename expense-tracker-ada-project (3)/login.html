<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Expense Tracker</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; background: #f0f4f8; }
        .auth-card { background: white; padding: 2rem; border-radius: 0.5rem; width: 100%; max-width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .auth-title { text-align: center; font-size: 1.5rem; font-weight: bold; margin-bottom: 1.5rem; color: var(--primary-color); }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.875rem; }
        .btn-block { width: 100%; padding: 0.75rem; font-size: 1rem; margin-top: 1rem; }
        .auth-links { text-align: center; margin-top: 1.5rem; font-size: 0.875rem; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-title">Welcome Back</div>
        <form id="loginForm">
            <div class="form-group">
                <label>Username or Email</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group" style="display: flex; gap: 0.5rem; align-items: center;">
                <input type="checkbox" id="showPassword" style="width: auto;">
                <label for="showPassword" style="margin: 0;">Show Password</label>
            </div>
            <button type="submit" class="btn-block">Login</button>
            <div class="auth-links">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
        </form>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
